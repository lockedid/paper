datasets:
  nwpu_caption: # name of the dataset builder
    dataset_card: dataset_card/nwpu_caption.md
    # data_dir: ${env.data_dir}/datasets
    data_type: images # [images|videos|features]

    build_info:
      # Enable all splits for fine-tuning with validation
      annotations:
        train:
          storage: /home/wj/dataset/RSIC/NWPU/annotations/NWPU_train.json
        val:
          storage: /home/wj/dataset/RSIC/NWPU/annotations/NWPU_val.json
        test:
          storage: /home/wj/dataset/RSIC/NWPU/annotations/NWPU_test.json
      images:
        storage: /home/wj/dataset/RSIC/NWPU/images/
