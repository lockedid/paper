model:
  arch: bita_opt
  model_type: pretrain_opt2.7b
  load_pretrained: True
  # initialize stage 2 pretraining from stage 1 pretrained model
  # IMPORTANT: Update this path after Stage 1 completes
  pretrained: "output/pretrain_stage1_ucm/checkpoint_best.pth"
  freeze_vit: True
  use_grad_checkpoint: False  # CRITICAL: Must be False when freeze_vit=True (performance optimization)
  # Restored agent_num to 64 (48 caused information bottleneck on RSICD)
  # Increased gate bias to -1.0 for better agent utilization
  agent_num: 64
  gate_bias: -1.0

datasets:
  ucm_caption:
    vis_processor:
        train:
          name: "bita_image_train"
          image_size: 224
    text_processor:
        train:
          name: "bita_caption"


run:
  task: image_text_pretrain
  # optimizer
  lr_sched: "linear_warmup_cosine_lr"
  init_lr: 1e-4
  min_lr: 1e-5
  warmup_lr: 1e-6

  weight_decay: 0.05
  max_epoch: 10
  batch_size_train: 48
  batch_size_eval: 64
  num_workers: 0
  warmup_steps: 500  # UCM是小数据集，降低warmup_steps
  
  # Save only the last epoch checkpoint for pretraining (saves disk space)
  save_only_last_epoch: True

  seed: 42
  output_dir: "output/pretrain_stage2_ucm/"

  amp: True
  resume_ckpt_path: null

  evaluate: False 
  train_splits: ["train"]

  device: "cuda"
  world_size: 1
  dist_url: "env://"
  distributed: True
