model:
  arch: bita_opt
  model_type: caption_rsicd_opt2.7b
  load_finetuned: True
  finetuned: "output/pretrain_stage2_ucm/20260414154/checkpoint_9.pth"
  use_grad_checkpoint: False  # CRITICAL: Must be False when freeze_vit=True (performance optimization)
  freeze_vit: True
  dataset_name: "ucm"  # Add dataset name for proper agent_num configuration
  # CRITICAL: Must match pretraining configuration to avoid shape mismatch
  agent_num: 64
  gate_bias: -1.0

datasets:
  # rsicd_caption:
  #   vis_processor:
  #       train:
  #         name: "bita_image_train"
  #         image_size: 224
  #       eval:
  #         name: "bita_image_train"
  #         image_size: 224
  #   text_processor:
  #       train:
  #         name: "bita_caption"
  #         prompt: "a photo of"
  #       eval:
  #         name: "bita_caption"
  # nwpu_caption:
  #   vis_processor:
  #       train:
  #         name: "bita_image_train"
  #         image_size: 224
  #       eval:
  #         name: "bita_image_train"
  #         image_size: 224
  #   text_processor:
  #       train:
  #         name: "bita_caption"
  #         prompt: "a photo of"
  #       eval:
  #         name: "bita_caption"
  ucm_caption:
    vis_processor:
        train:
          name: "bita_image_train"
          image_size: 224
        eval:
          name: "bita_image_eval"
          image_size: 224
    text_processor:
        train:
          name: "bita_caption"
          prompt: "a photo of"
        eval:
          name: "bita_caption"


run:
  task: captioning
  # optimizer
  lr_sched: "linear_warmup_cosine_lr"
  init_lr: 1e-5
  min_lr: 0
  warmup_lr: 1e-8
  warmup_steps: 200  # UCM是小数据集，显著降低warmup_steps (原1000)
  weight_decay: 0.05
  max_epoch: 50
  batch_size_train: 48
  batch_size_eval: 16
  num_workers: 0
  accum_grad_iters: 1

  max_len: 22
  min_len: 5
  num_beams: 5

  seed: 42
  output_dir: "output/finetune_ucm/"

  amp: True
  resume_ckpt_path: null

  evaluate: False
  train_splits: ["train"]
  valid_splits: ["val"]   # Enable validation for monitoring
  test_splits: ["test"]   # Enable testing for final evaluation

  device: "cuda"
  world_size: 1
  dist_url: "env://"
  distributed: True
