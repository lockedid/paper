model:
  arch: bita_opt
  model_type: pretrain_opt2.7b
  load_pretrained: True
  # 【优化】：使用相对路径，指向 Stage 1 输出目录
  # 注意：实际路径会在训练时由 output_dir 自动确定
  pretrained: "/home/wj/code/BITA-main/BITA/BITA/output/pretrain_stage1_rsicd/20260419094/checkpoint_19.pth"
  freeze_vit: True
  use_grad_checkpoint: False  # CRITICAL: Must be False when freeze_vit=True (performance optimization)
  # 【重要】：必须与 Stage 1 完全一致！
  # agent_num=64: 与 Stage 1 保持一致
  # gate_bias=-1.0: 与 Stage 1 保持一致（代码会进行分层自适应调整）
  agent_num: 64
  gate_bias: -1.0


datasets:
  rsicd_caption:
    vis_processor:
        train:
          name: "bita_image_train"
          image_size: 224
    text_processor:
        train:
          name: "bita_caption"


run:
  task: image_text_pretrain
  # optimizer
  lr_sched: "linear_warmup_cosine_lr"
  init_lr: 1e-4
  min_lr: 1e-5
  warmup_lr: 1e-6

  weight_decay: 0.05
  max_epoch: 15
  batch_size_train: 48
  batch_size_eval: 64
  num_workers: 0
  warmup_steps: 4000
  
  # Save only the last epoch checkpoint for pretraining (saves disk space)
  save_only_last_epoch: True

  seed: 42
  output_dir: "output/pretrain_stage2_rsicd/"

  amp: True
  resume_ckpt_path: null

  evaluate: False 
  train_splits: ["train"]

  device: "cuda"
  world_size: 1
  dist_url: "env://"
  distributed: True
