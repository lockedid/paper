model:
  arch: bita_former
  model_type: pretrain_vitL
  load_pretrained: False  # pretained from scratch
  freeze_vit: True
  use_grad_checkpoint: False  # CRITICAL: Must be False when freeze_vit=True (performance optimization)
  # Restored agent_num to 64 (48 caused information bottleneck on RSICD)
  # Increased gate bias to -1.0 for better agent utilization
  agent_num: 60
  gate_bias: -0.8

datasets:
  nwpu_caption:
    vis_processor:
        train:
          name: "bita_image_train"
          image_size: 224
    text_processor:
        train:
          name: "bita_caption"

run:
  task: image_text_pretrain
  # optimizer
  lr_sched: "linear_warmup_cosine_lr"
  init_lr: 1e-4
  min_lr: 1e-5
  warmup_lr: 1e-6

  weight_decay: 0.05
  max_epoch: 20
  batch_size_train: 96
  batch_size_eval: 64
  num_workers: 0
  warmup_steps: 5000
  
  # Save only the last epoch checkpoint for pretraining (saves disk space)
  save_only_last_epoch: True

  seed: 42
  output_dir: "output/pretrain_stage1_nwpu/"

  amp: True
  resume_ckpt_path: null

  evaluate: False 
  train_splits: ["train"]

  device: "cuda"
  world_size: 1
  dist_url: "env://"
  distributed: True
