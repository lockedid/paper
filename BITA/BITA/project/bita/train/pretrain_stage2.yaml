model:
  arch: bita_opt
  model_type: pretrain_opt2.7b
  load_pretrained: True
  # intialize stage 2 pretraining from stage 1 pretrained model
  #pretrained: ""
  freeze_vit: True
  # Restored agent_num to 64 (48 caused information bottleneck on RSICD)
  # Increased gate bias to -1.0 for better agent utilization
  agent_num: 64
  gate_bias: -1.0


datasets:

  rsicd_caption:
    vis_processor:
        train:
          name: "bita_image_train"
          image_size: 224
    text_processor:
        train:
          name: "bita_caption"
  nwpu_caption:
    vis_processor:
        train:
          name: "bita_image_train"
          image_size: 224
    text_processor:
        train:
          name: "bita_caption"
  ucm_caption:
    vis_processor:
        train:
          name: "bita_image_train"
          image_size: 224
    text_processor:
        train:
          name: "bita_caption"


run:
  task: image_text_pretrain
  # optimizer
  lr_sched: "linear_warmup_cosine_lr"
  init_lr: 1e-4
  min_lr: 1e-5
  warmup_lr: 1e-6

  weight_decay: 0.05
  max_epoch: 10
  batch_size_train: 48
  # batch_size_train: 24
  batch_size_eval: 64
  num_workers: 0
  warmup_steps: 2000
  
  # Dataset sampling ratios for multi-dataset pretraining
  # Format: [UCM, RSICD, NWPU]
  # UCM (small): 4x - high frequency sampling for sufficient learning
  # RSICD (hard): 2x - medium sampling to avoid dominance but ensure coverage
  # NWPU (large): 1x - low frequency sampling to prevent overfitting
  train_dataset_ratios: [4, 2, 1]

  seed: 42
  output_dir: "output/"

  amp: True
  resume_ckpt_path: null

  evaluate: False 
  train_splits: ["train"]

  device: "cuda"
  world_size: 1
  dist_url: "env://"
  distributed: True