model:
  arch: bita_opt
  model_type: caption_rsicd_opt2.7b
  load_finetuned: True
  # 【优化】：使用相对路径，指向 Stage 2 输出目录
  finetuned: "/home/wj/code/BITA-main/BITA/BITA/output/pretrain_stage2_rsicd/20260419110/checkpoint_14.pth"
  use_grad_checkpoint: False  # CRITICAL: Must be False when freeze_vit=True (performance optimization)
  freeze_vit: True
  # 【重要】：必须与预训练阶段完全一致！
  # agent_num=64: 与 Stage 1/2 保持一致
  # gate_bias=-1.0: 与 Stage 1/2 保持一致（代码会进行分层自适应调整）
  agent_num: 64
  gate_bias: -1.0

datasets:
  rsicd_caption:
    vis_processor:
        train:
          name: "bita_image_train"
          image_size: 224
        eval:
          name: "bita_image_eval"
          image_size: 224
    text_processor:
        train:
          name: "bita_caption"
          prompt: "a photo of"
        eval:
          name: "bita_caption"

run:
  task: captioning
  # optimizer
  lr_sched: "linear_warmup_cosine_lr"
  init_lr: 1e-5
  min_lr: 0
  warmup_lr: 1e-8
  warmup_steps: 1000
  weight_decay: 0.05
  max_epoch: 50
  batch_size_train: 48
  batch_size_eval: 16
  num_workers: 0
  accum_grad_iters: 1

  max_len: 22
  min_len: 5
  num_beams: 5

  seed: 42
  output_dir: "output/finetune_rsicd/"

  amp: True
  resume_ckpt_path: null

  evaluate: False
  train_splits: ["train"]
  valid_splits: ["val"]   # Enable validation for monitoring
  test_splits: ["test"]   # Enable testing for final evaluation

  device: "cuda"
  world_size: 1
  dist_url: "env://"
  distributed: True
